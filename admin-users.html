        // Pagination state
        let currentPage = 1;
        const itemsPerPage = 10;

        // Render users table
        function renderUsers() {
            const tbody = document.getElementById('usersTableBody');
            const filteredUsers = filterUsers();
            const totalPages = Math.ceil(filteredUsers.length / itemsPerPage);

            // Ensure current page is within valid range
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const usersToShow = filteredUsers.slice(startIndex, endIndex);

            tbody.innerHTML = usersToShow.map(user => `
                <tr>
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">
                                ${user.name.charAt(0)}
                            </div>
                            <div>
                                <div style="font-weight: 600; color: #333;">${user.name}</div>
                                <div style="font-size: 12px; color: #666;">${user.phone}</div>
                            </div>
                        </div>
                    </td>
                    <td>${user.email}</td>
                    <td>${user.role === 'admin' ? 'مسؤول' : 'مستخدم'}</td>
                    <td>${user.registrationDate}</td>
                    <td>${user.lastLogin ? user.lastLogin : 'لم يسجل دخول'}</td>
                    <td>
                        <span class="user-status ${user.status}">
                            ${user.status === 'active' ? 'نشط' : user.status === 'inactive' ? 'غير نشط' : 'قيد الانتظار'}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-view" onclick="viewUser(${user.id})">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-edit" onclick="editUser(${user.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-delete" onclick="deleteUser(${user.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');

            renderPagination(totalPages);
            updateStatistics();
        }

        // Filter users based on filters
        function filterUsers() {
            const statusFilter = document.getElementById('statusFilter').value;
            const roleFilter = document.getElementById('roleFilter').value;
            const searchFilter = document.getElementById('searchFilter').value.toLowerCase();

            return users.filter(user => {
                if (statusFilter !== 'all' && user.status !== statusFilter) return false;
                if (roleFilter !== 'all' && user.role !== roleFilter) return false;
                if (searchFilter && !user.name.toLowerCase().includes(searchFilter) && 
                    !user.email.toLowerCase().includes(searchFilter)) return false;
                return true;
            });
        }

        // Render pagination
        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            let paginationHTML = `
                <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-right"></i>
                </button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                paginationHTML += `
                    <button onclick="changePage(${i})" ${i === currentPage ? 'class="active"' : ''}>
                        ${i}
                    </button>
                `;
            }

            paginationHTML += `
                <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i>
                </button>
            `;

            pagination.innerHTML = paginationHTML;
        }

        // Change page
        function changePage(page) {
            currentPage = page;
            renderUsers();
        }

        // View user details
        function viewUser(userId) {
            const user = users.find(u => u.id === userId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>تفاصيل المستخدم</h2>
                        <button class="close-btn" onclick="this.closest('.modal').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="user-details">
                            <div class="user-avatar-large">
                                ${user.name.charAt(0)}
                            </div>
                            <div class="user-info-large">
                                <h3>${user.name}</h3>
                                <p class="user-role">${user.role === 'admin' ? 'مسؤول' : 'مستخدم'}</p>
                            </div>
                        </div>
                        <div class="details-grid">
                            <div class="detail-item">
                                <label>البريد الإلكتروني</label>
                                <p>${user.email}</p>
                            </div>
                            <div class="detail-item">
                                <label>رقم الهاتف</label>
                                <p>${user.phone}</p>
                            </div>
                            <div class="detail-item">
                                <label>العنوان</label>
                                <p>${user.address}</p>
                            </div>
                            <div class="detail-item">
                                <label>تاريخ التسجيل</label>
                                <p>${user.registrationDate}</p>
                            </div>
                            <div class="detail-item">
                                <label>آخر دخول</label>
                                <p>${user.lastLogin ? user.lastLogin : 'لم يسجل دخول'}</p>
                            </div>
                            <div class="detail-item">
                                <label>الحالة</label>
                                <span class="user-status ${user.status}">
                                    ${user.status === 'active' ? 'نشط' : user.status === 'inactive' ? 'غير نشط' : 'قيد الانتظار'}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
        }

        // Edit user
        function editUser(userId) {
            const user = users.find(u => u.id === userId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>تعديل بيانات المستخدم</h2>
                        <button class="close-btn" onclick="this.closest('.modal').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <form id="editUserForm">
                            <div class="form-group">
                                <label>الاسم الكامل</label>
                                <input type="text" name="name" value="${user.name}" required>
                            </div>
                            <div class="form-group">
                                <label>البريد الإلكتروني</label>
                                <input type="email" name="email" value="${user.email}" required>
                            </div>
                            <div class="form-group">
                                <label>رقم الهاتف</label>
                                <input type="tel" name="phone" value="${user.phone}" required>
                            </div>
                            <div class="form-group">
                                <label>العنوان</label>
                                <input type="text" name="address" value="${user.address}" required>
                            </div>
                            <div class="form-group">
                                <label>الدور</label>
                                <select name="role" required>
                                    <option value="user" ${user.role === 'user' ? 'selected' : ''}>مستخدم</option>
                                    <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>مسؤول</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>الحالة</label>
                                <select name="status" required>
                                    <option value="active" ${user.status === 'active' ? 'selected' : ''}>نشط</option>
                                    <option value="inactive" ${user.status === 'inactive' ? 'selected' : ''}>غير نشط</option>
                                    <option value="pending" ${user.status === 'pending' ? 'selected' : ''}>قيد الانتظار</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i>
                                حفظ التغييرات
                            </button>
                        </form>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            modal.querySelector('#editUserForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                user.name = formData.get('name');
                user.email = formData.get('email');
                user.phone = formData.get('phone');
                user.address = formData.get('address');
                user.role = formData.get('role');
                user.status = formData.get('status');

                renderUsers();
                updateStatistics();
                modal.remove();
                alert('تم تحديث بيانات المستخدم بنجاح');
            });
        }

        // Delete user
        function deleteUser(userId) {
            const user = users.find(u => u.id === userId);
            if (confirm(`هل أنت متأكد من حذف المستخدم "${user.name}"؟

هذا الإجراء لا يمكن التراجع عنه.`)) {
                const index = users.findIndex(u => u.id === userId);
                if (index !== -1) {
                    users.splice(index, 1);
                    renderUsers();
                    alert('تم حذف المستخدم بنجاح');
                }
            }
        }

        // Setup filter event listeners
        document.getElementById('statusFilter').addEventListener('change', () => {
            currentPage = 1;
            renderUsers();
        });

        document.getElementById('roleFilter').addEventListener('change', () => {
            currentPage = 1;
            renderUsers();
        });

        document.getElementById('searchFilter').addEventListener('input', () => {
            currentPage = 1;
            renderUsers();
        });

        // Update statistics
        function updateStatistics() {
            const totalUsers = users.length;
            const activeUsers = users.filter(u => u.status === 'active').length;
            const pendingUsers = users.filter(u => u.status === 'pending').length;
            const adminUsers = users.filter(u => u.role === 'admin').length;

            document.getElementById('totalUsers').textContent = totalUsers;
            document.getElementById('activeUsers').textContent = activeUsers;
            document.getElementById('pendingUsers').textContent = pendingUsers;
            document.getElementById('adminUsers').textContent = adminUsers;
        }

        // Export users to Excel
        function exportToExcel() {
            const headers = ['الاسم', 'البريد الإلكتروني', 'رقم الهاتف', 'العنوان', 'الدور', 'الحالة', 'تاريخ التسجيل', 'آخر دخول'];
            const data = users.map(user => [
                user.name,
                user.email,
                user.phone,
                user.address,
                user.role === 'admin' ? 'مسؤول' : 'مستخدم',
                user.status === 'active' ? 'نشط' : user.status === 'inactive' ? 'غير نشط' : 'قيد الانتظار',
                user.registrationDate,
                user.lastLogin ? user.lastLogin : 'لم يسجل دخول'
            ]);

            let csvContent = '﻿'; // Add BOM for UTF-8
            csvContent += headers.join(',') + '
';
            csvContent += data.map(row => row.join(',')).join('
');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            link.setAttribute('href', url);
            link.setAttribute('download', `users_export_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Show add user modal
        function showAddUserModal() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>إضافة مستخدم جديد</h2>
                        <button class="close-btn" onclick="this.closest('.modal').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <form id="addUserForm">
                            <div class="form-group">
                                <label>الاسم الكامل</label>
                                <input type="text" name="name" required>
                            </div>
                            <div class="form-group">
                                <label>البريد الإلكتروني</label>
                                <input type="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label>رقم الهاتف</label>
                                <input type="tel" name="phone" required>
                            </div>
                            <div class="form-group">
                                <label>العنوان</label>
                                <input type="text" name="address" required>
                            </div>
                            <div class="form-group">
                                <label>الدور</label>
                                <select name="role" required>
                                    <option value="user">مستخدم</option>
                                    <option value="admin">مسؤول</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>الحالة</label>
                                <select name="status" required>
                                    <option value="active">نشط</option>
                                    <option value="inactive">غير نشط</option>
                                    <option value="pending">قيد الانتظار</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus"></i>
                                إضافة المستخدم
                            </button>
                        </form>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            modal.querySelector('#addUserForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                const userData = {
                    id: Date.now(),
                    name: formData.get('name'),
                    email: formData.get('email'),
                    phone: formData.get('phone'),
                    address: formData.get('address'),
                    role: formData.get('role'),
                    status: formData.get('status'),
                    registrationDate: new Date().toISOString().split('T')[0],
                    lastLogin: null
                };

                users.push(userData);
                renderUsers();
                updateStatistics();
                modal.remove();
                alert('تم إضافة المستخدم بنجاح');
            });
        }

        // Initialize users table and statistics
        renderUsers();
        updateStatistics();
    </script>
</body>
</html>
