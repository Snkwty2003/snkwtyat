<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إتمام الطلب - شنكوتيات</title>

<style>
body{
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#f5f5f5,#eaeaea);
  direction:rtl;
  margin:0;
  padding-top:80px; /* لتجنب تغطية الهيدر */
}

/* HEADER ثابت */
#header{
  position:fixed;
  top:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
  z-index:1000;
}

#header .logo{
  font-size:22px;
  font-weight:bold;
  color:#ff5722;
  text-align:center;
  margin:0 auto;
}

#header .header-buttons{
  display:flex;
  gap:10px;
}

.header-buttons button{
  background:#ff5722;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.header-buttons button:hover{
  transform:scale(1.05);
}

/* الحاوية */
.container{
  max-width:500px;
  margin:20px auto 40px;
  background:#fff;
  padding:25px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  animation:fadeIn .5s ease;
}

/* عنوان */
h2{
  text-align:center;
  color:#ff5722;
  margin-bottom:20px;
  font-size:22px;
}

/* صندوق الطلب */
.order-box{
  background:#fafafa;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  border:1px solid #eee;
  font-size:14px;
}

/* الحقول */
input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
  transition:0.3s;
  font-size:14px;
}

input:focus, textarea:focus{
  border-color:#ff5722;
  outline:none;
  box-shadow:0 0 5px rgba(255,87,34,0.3);
}

/* زر إرسال */
#sendBtn{
  width:100%;
  padding:12px;
  background:linear-gradient(45deg,#25D366,#1ebe5d);
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
  margin-top:10px;
}

#sendBtn:hover{
  transform:scale(1.03);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* رسالة نجاح */
#successMessage{
  display:none;
  text-align:center;
  background:#4caf50;
  color:#fff;
  padding:10px 15px;
  border-radius:6px;
  margin-bottom:10px;
}

/* أنيميشن */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<!-- HEADER ثابت -->
<div id="header">
  <div class="header-buttons">
    <button onclick="window.location.href='index.html'">العودة للمتجر</button>
    <button onclick="window.location.href='/'">الصفحة الرئيسية</button>
  </div>
  <div class="logo">شنكوتيات</div>
</div>

<!-- الحاوية -->
<div class="container">
  <h2>إتمام الطلب</h2>

  <div id="successMessage">تمت إضافة الطلب! سيتم تحويلك لواتساب...</div>

  <div class="order-box" id="orderSummary"></div>

  <input type="text" id="name" placeholder="الاسم">
  <input type="text" id="phone" placeholder="رقم الهاتف">
  <textarea id="address" placeholder="العنوان"></textarea>
  <textarea id="note" placeholder="ملاحظات (اختياري)"></textarea>

  <button id="sendBtn" onclick="sendOrder()">إرسال الطلب عبر واتساب</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* عرض الطلب */
function showOrder(){
  let html='';
  let total=0;

  cart.forEach(p=>{
    let qty = p.qty || 1;
    total += p.price * qty;

    html += `<div>${p.name} × ${qty} = $${(p.price*qty).toFixed(2)}</div>`;
  });

  html += `<hr>الإجمالي: $${total.toFixed(2)}`;
  document.getElementById('orderSummary').innerHTML=html;
}
showOrder();

/* حفظ البيانات مؤقتًا */
['name','phone','address','note'].forEach(id=>{
  const el = document.getElementById(id);
  el.value = localStorage.getItem(id) || '';
  el.addEventListener('input',()=> localStorage.setItem(id, el.value));
});

/* إرسال الطلب */
function sendOrder(){
  let name = document.getElementById('name').value.trim();
  let phoneUser = document.getElementById('phone').value.trim();
  let address = document.getElementById('address').value.trim();
  let note = document.getElementById('note').value.trim();

  // Validation
  if(!name || !phoneUser || !address){
    alert("يرجى ملء الاسم والهاتف والعنوان");
    return;
  }
  
  // Check empty cart
  let cart = JSON.parse(localStorage.getItem("cart") || '[]');
  if(cart.length === 0){
    alert("سلتك فارغة");
    return;
  }

  let message = "طلب جديد:%0A%0A";

  let total = 0;

  cart.forEach(p=>{
    let qty = p.qty || 1;
    message += `${p.name} × ${qty} = $${(p.price*qty).toFixed(2)}%0A`;
    total += p.price * qty;
  });

  message += `%0Aالإجمالي: $${total.toFixed(2)}%0A%0A`;
  message += `الاسم: ${name}%0A`;
  message += `الهاتف: ${phoneUser}%0A`;
  message += `العنوان: ${address}%0A`;
  message += `ملاحظات: ${note}`;

  let phone = "218913230827"; // حط رقمك
  let url = `https://wa.me/${phone}?text=${message}`;

  // عرض رسالة نجاح
  const msg = document.getElementById('successMessage');
  msg.style.display='block';

  setTimeout(()=>{
    window.open(url, "_blank");
    // ⭐ تفريغ النموذج بعد الإرسال
    ['name','phone','address','note'].forEach(id=>{
      document.getElementById(id).value='';
      localStorage.removeItem(id);
    });
  },1500);
}
</script>

</body>
</html>
