<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - شنكوتيات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 450px; padding: 40px; animation: fadeInUp 0.6s ease-out; }
        .login-header { text-align: center; margin-bottom: 40px; }
        .login-header h1 { color: #333; font-size: 32px; margin-bottom: 10px; }
        .login-header p { color: #666; font-size: 16px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 14px; }
        .form-options label { display: flex; align-items: center; gap: 5px; color: #666; cursor: pointer; }
        .form-options a { color: #667eea; text-decoration: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'Tajawal', sans-serif; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .social-login { margin-top: 30px; text-align: center; }
        .social-login p { color: #999; margin-bottom: 20px; font-size: 14px; }
        .social-buttons { display: flex; gap: 15px; justify-content: center; }
        .social-btn { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; background: white; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; color: #333; font-size: 14px; font-weight: 500; font-family: 'Tajawal', sans-serif; }
        .social-btn:hover { border-color: #667eea; background: #f8f9ff; }
        .social-btn i { font-size: 18px; }
        .social-btn.google i { color: #DB4437; }
        .signup-link { text-align: center; margin-top: 25px; font-size: 14px; color: #666; }
        .signup-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        #errorBox { display:none; background:#ffebee; color:#c62828; padding:12px; border-radius:8px; margin-bottom:20px; text-align:center; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) { .login-container { padding: 30px 20px; } .social-buttons { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>مرحباً بعودتك 👋</h1>
            <p>سجل دخولك للمتابعة إلى حسابك</p>
        </div>

        <div id="errorBox"></div>

        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@email.com">
        </div>

        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور">
        </div>

        <div class="form-options">
            <label><input type="checkbox" id="remember"> تذكرني</label>
            <a href="forgot-password.html">نسيت كلمة المرور؟</a>
        </div>

        <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">
            تسجيل الدخول
        </button>

        <div class="social-login">
            <p>أو سجل الدخول عبر</p>
            <div class="social-buttons">
                <button class="social-btn google" onclick="loginWithGoogle()">
                    <i class="fab fa-google"></i> Google
                </button>
            </div>
        </div>

        <div class="signup-link">
            ليس لديك حساب؟ <a href="register.html">أنشئ حساباً جديداً</a>
        </div>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword, signOut } from './firebase-config.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // تسجيل الدخول بالإيميل
        window.handleLogin = async function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorBox = document.getElementById('errorBox');

            errorBox.style.display = 'none';

            if (!email || !password) {
                errorBox.textContent = 'يرجى ملء جميع الحقول';
                errorBox.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل الدخول...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'index.html';
            } catch (error) {
                errorBox.textContent = 'بيانات الدخول غير صحيحة';
                errorBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'تسجيل الدخول';
            }
        }

        // تسجيل الدخول بـ Google
        window.loginWithGoogle = async function() {
            const provider = new GoogleAuthProvider();
            const errorBox = document.getElementById('errorBox');
            errorBox.style.display = 'none';

            try {
                await signInWithPopup(auth, provider);
                window.location.href = 'index.html';
            } catch (error) {
                errorBox.textContent = 'حدث خطأ في تسجيل الدخول بـ Google';
                errorBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
