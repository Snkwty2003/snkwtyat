<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر ملابس انيق</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
        }
        .content {
            padding: 20px;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .product {
            margin: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: calc(33.33% - 20px);
        }
        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }
        .product h2 {
            margin-top: 0;
        }
        .product p {
            margin-bottom: 20px;
        }
        .product button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .product button:hover {
            background-color: #3e8e41;
        }
        @media only screen and (max-width: 768px) {
            .container {
                margin: 20px auto;
                padding: 10px;
            }
            .product {
                width: calc(50% - 20px);
            }
        }
        @media only screen and (max-width: 480px) {
            .product {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>متجر ملابس انيق</h1>
        </div>
        <div class="content">
            <h2>منتجاتنا</h2>
            <div class="products">
                <div class="product">
                    <img src="https://via.placeholder.com/300" alt="منتج 1">
                    <h2>منتج 1</h2>
                    <p>هذا هو وصف المنتج. المنتج الجديد يحتوي على العديد من الميزات الحديثة.</p>
                    <button>اشتر الآن</button>
                </div>
                <div class="product">
                    <img src="https://via.placeholder.com/300" alt="منتج 2">
                    <h2>منتج 2</h2>
                    <p>هذا هو وصف المنتج. المنتج الجديد يحتوي على العديد من الميزات الحديثة.</p>
                    <button>اشتر الآن</button>
                </div>
                <div class="product">
                    <img src="https://via.placeholder.com/300" alt="منتج 3">
                    <h2>منتج 3</h2>
                    <p>هذا هو وصف المنتج. المنتج الجديد يحتوي على العديد من الميزات الحديثة.</p>
                    <button>اشتر الآن</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
