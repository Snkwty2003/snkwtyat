<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر شنكوتيات</title>
<link rel="stylesheet" href="css/store-new.css">
</head>
<body>

<div id="header">
  <div class="header-buttons">
    <a href="index.html">العودة</a>
    <button onclick="toggleCart()">
      السلة (<span id="cart-count">0</span>)
    </button>
  </div>
  <h1 class="logo">متجر شنكوتيات</h1>
</div>

<div class="top-bar">
  <input type="text" id="search" placeholder="بحث..." oninput="applyFilters()">
  <select id="filter" onchange="applyFilters()">
    <option value="all">كل القوالب</option>
    <option value="ملابس">ملابس</option>
    <option value="متجر">متجر</option>
    <option value="مدونة">مدونة</option>
    <option value="أعمال">أعمال</option>
    <option value="لوحة تحكم">لوحة تحكم</option>
    <option value="إبداعي">إبداعي</option>
    <option value="صيدلية">صيدلية</option>
  </select>
</div>

<div class="products-container" id="products"></div>

<div id="cartBox" style="display:none;">
  <h3>سلة الشراء</h3>
  <div id="cart-items"></div>
  <div class="cart-total" id="cart-total"></div>
  <div class="cart-actions">
    <button class="clear-cart-btn" onclick="clearCart()">تفريغ السلة</button>
    <button class="checkout-btn" onclick="goToCheckout()">إتمام الطلب</button>
  </div>
</div>

<div id="modal" style="display:none;">
  <div class="modal-content">
    <img id="mImg" src="" alt="" style="width:100%;height:200px;object-fit:cover;border-radius:8px;margin-bottom:15px;">
    <h3 id="mName"></h3>
    <p id="mDesc"></p>
    <span class="modal-price" id="mPrice"></span>
    <div class="modal-actions">
      <button class="add-to-cart-btn" onclick="addToCartFromModal()">أضف للسلة</button>
      <button class="close-modal-btn" onclick="closeModal()">إغلاق</button>
    </div>
  </div>
</div>

<div id="toast" style="display:none;">تمت الإضافة للسلة ✅</div>

<div id="footer">
  <span>© 2026 شنكوتيات - جميع الحقوق محفوظة</span>
</div>

<script>
const products = [
  {
    id: 1,
    name: "قالب صيدلية داوائي",
    desc: "قالب HTML احترافي لصيدلية أو متجر أدوية - تصميم أنيق ومتجاوب مع جميع الأجهزة",
    price: 19.99,
    cat: "صيدلية",
    img: "/images/template-pharmacy.png",
    preview: "/templates/dawai-pharmacy (1).html"
  },
  {
    id: 2,
    name: "Glass Fashion",
    desc: "قالب ملابس بتصميم زجاجي داكن عصري وأنيق",
    price: 24.99,
    cat: "ملابس",
    img: "/images/template-glass-fashion.png",
    preview: "/templates/modern_glass_fashion.html"
  },
  {
    id: 3,
    name: "Immersive Fashion",
    desc: "قالب ملابس بتجربة غامرة وتصميم جذاب",
    price: 24.99,
    cat: "ملابس",
    img: "/images/template-immersive-fashion.png",
    preview: "/templates/immersive_fashion.html"
  },
  {
    id: 4,
    name: "Fashion Archive",
    desc: "قالب أرشيف الموضة - تصميم كلاسيكي راقي",
    price: 24.99,
    cat: "ملابس",
    img: "/images/template-archive.png",
    preview: "/templates/fashion_archive.html"
  },
  {
    id: 5,
    name: "Brutal Fashion",
    desc: "قالب ملابس بتصميم جريء وبدون زخرفة",
    price: 24.99,
    cat: "ملابس",
    img: "/images/template-brutal.png",
    preview: "/templates/brutalism_fashion.html"
  },
  {
    id: 6,
    name: "Typography Architecture",
    desc: "قالب معماري يعتمد على الطباعة كعنصر تصميمي رئيسي",
    price: 29.99,
    cat: "أعمال",
    img: "/images/template-typography.png",
    preview: "/templates/typography_architecture.html"
  },
  {
    id: 7,
    name: "Minimal Functionalism",
    desc: "قالب منتجات بسيط ونظيف - تصميم وظيفي بدون تعقيد",
    price: 29.99,
    cat: "متجر",
    img: "/images/template-minimal.png",
    preview: "/templates/minimal_functionalism.html"
  },
  {
    id: 8,
    name: "Kinetic Editorial",
    desc: "قالب مدونة وأرشيف بتصميم تحريري متحرك",
    price: 29.99,
    cat: "مدونة",
    img: "/images/template-kinetic.png",
    preview: "/templates/kinetic_editorial.html"
  },
  {
    id: 9,
    name: "Immersive Storytelling",
    desc: "قالب قصصي غامر للرحلات والمحتوى الإبداعي",
    price: 34.99,
    cat: "إبداعي",
    img: "/images/template-storytelling.png",
    preview: "/templates/immersive_storytelling.html"
  },
  {
    id: 10,
    name: "Glass Light UI",
    desc: "لوحة تحكم زجاجية بتصميم داكن احترافي",
    price: 39.99,
    cat: "لوحة تحكم",
    img: "/images/template-glass-ui.png",
    preview: "/templates/glass_light_ui.html"
  },
  {
    id: 11,
    name: "Dynamic Contrast",
    desc: "لوحة تحكم ديناميكية بتباين عالي ومميز",
    price: 39.99,
    cat: "لوحة تحكم",
    img: "/images/template-dynamic.png",
    preview: "/templates/dynamic_contrast (2).html"
  },
  {
    id: 12,
    name: "Digital Brutalism",
    desc: "قالب معماري برتوتالي رقمي جريء",
    price: 29.99,
    cat: "أعمال",
    img: "/images/template-digital-brutal.png",
    preview: "/templates/digital_brutalism.html"
  }
];

let cart = JSON.parse(localStorage.getItem('cart') || '[]');
let currentProduct = null;

function renderProducts(list) {
  const container = document.getElementById('products');
  container.innerHTML = list.map(p => `
    <div class="product">
      <img src="${p.img}" alt="${p.name}">
      <div class="product-content">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <div class="product-price">$${p.price}</div>
        <button onclick="openModal(${p.id})">معاينة</button>
      </div>
    </div>
  `).join('');
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter').value;
  let filtered = products;
  if (filter !== 'all') filtered = filtered.filter(p => p.cat === filter);
  if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search));
  renderProducts(filtered);
}

function openModal(id) {
  currentProduct = products.find(p => p.id === id);
  if (!currentProduct) return;
  document.getElementById('mName').textContent = currentProduct.name;
  document.getElementById('mDesc').textContent = currentProduct.desc;
  document.getElementById('mPrice').textContent = '$' + currentProduct.price;
  document.getElementById('mImg').src = currentProduct.img;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  currentProduct = null;
}

function toggleCart() {
  const box = document.getElementById('cartBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function addToCartFromModal() {
  if (!currentProduct) return;
  const found = cart.find(i => i.id === currentProduct.id);
  if (found) { found.qty++; } else { cart.push({...currentProduct, qty: 1}); }
  updateCart();
  closeModal();
  showToast();
}

function clearCart() {
  if (confirm('هل أنت متأكد؟')) { cart = []; updateCart(); }
}

function goToCheckout() {
  if (cart.length === 0) { alert('السلة فارغة!'); return; }
  window.location.href = 'checkout.html';
}

function updateCart() {
  const cartItems = document.getElementById('cart-items');
  const cartCount = document.getElementById('cart-count');
  const cartTotal = document.getElementById('cart-total');
  let total = 0;
  let html = '';
  cart.forEach((p, i) => {
    total += p.price * (p.qty || 1);
    html += `<div class="cart-item"><span>${p.name} × ${p.qty}</span><button onclick="removeFromCart(${i})">حذف</button></div>`;
  });
  cartItems.innerHTML = html;
  cartCount.textContent = cart.length;
  cartTotal.textContent = 'الإجمالي: $' + total.toFixed(2);
  localStorage.setItem('cart', JSON.stringify(cart));
}

function removeFromCart(i) {
  cart.splice(i, 1);
  updateCart();
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 2000);
}

renderProducts(products);
updateCart();
</script>

</body>
</html>
