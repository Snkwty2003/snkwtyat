<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدير - شنكوتيات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: fadeInUp 0.6s ease-out;
        }
        .login-header { text-align: center; margin-bottom: 40px; }
        .login-header h1 { color: #333; font-size: 32px; margin-bottom: 10px; }
        .login-header p { color: #666; font-size: 16px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            transition: 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-group input.error { border-color: #ff4444; }
        .error-message { color: #ff4444; font-size: 14px; margin-top: 5px; display: none; }
        .form-group input.error + .error-message { display: block; }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .form-options label { display: flex; align-items: center; gap: 5px; color: #666; cursor: pointer; }
        .form-options a { color: #667eea; text-decoration: none; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Tajawal', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, #E33E10 0%, #ff6b4a 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(227, 62, 16, 0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .signup-link { text-align: center; margin-top: 25px; font-size: 14px; color: #666; }
        .signup-link a { color: #E33E10; text-decoration: none; font-weight: 600; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>لوحة تحكم المدير 🔐</h1>
            <p>تسجيل الدخول إلى لوحة الإدارة</p>
        </div>

        <div id="errorBox" style="display:none;background:#ffebee;color:#c62828;padding:12px;border-radius:8px;margin-bottom:20px;text-align:center;"></div>

        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="admin@snkwtyat.com">
        </div>

        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور">
        </div>

        <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">
            دخول لوحة التحكم
        </button>

        <div class="signup-link" style="margin-top:20px;">
            العودة للـ <a href="index.html">الصفحة الرئيسية</a>
        </div>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword, db, getDoc, doc } from './firebase-config.js';

        window.handleLogin = async function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorBox = document.getElementById('errorBox');

            errorBox.style.display = 'none';

            if (!email || !password) {
                errorBox.textContent = 'يرجى ملء جميع الحقول';
                errorBox.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // التحقق من صلاحيات الأدمن
                const adminDoc = await getDoc(doc(db, 'admins', user.uid));

                if (adminDoc.exists() && adminDoc.data().role === 'admin') {
                    localStorage.setItem('adminUser', JSON.stringify({
                        email: user.email,
                        uid: user.uid,
                        role: 'admin',
                        isLoggedIn: true
                    }));
                    window.location.href = 'admin-dashboard.html';
                } else {
                    errorBox.textContent = 'ليس لديك صلاحيات للدخول';
                    errorBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = 'دخول لوحة التحكم';
                }
            } catch (error) {
                errorBox.textContent = 'بيانات الدخول غير صحيحة';
                errorBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'دخول لوحة التحكم';
            }
        }
    </script>
</body>
</html>
