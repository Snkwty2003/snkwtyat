<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور - لوحة تحكم الإدارة</title>
    <meta name="description" content="استعادة كلمة المرور في لوحة تحكم الإدارة">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .forgot-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            display: flex;
        }

        .forgot-image {
            width: 50%;
            background: linear-gradient(135deg, #E33E10 0%, #ff6b4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .forgot-image::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover;
            background-position: bottom;
            animation: moveBackground 20s linear infinite;
        }

        @keyframes moveBackground {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .forgot-image-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
        }

        .forgot-image-content i {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .forgot-image-content h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .forgot-image-content p {
            font-size: 16px;
            opacity: 0.9;
        }

        .forgot-form-container {
            width: 50%;
            padding: 40px;
        }

        .forgot-form-container h2 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .forgot-form-container p {
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #E33E10;
        }

        .form-group .input-group {
            position: relative;
        }

        .form-group .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #E33E10 0%, #ff6b4a 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(227, 62, 16, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(227, 62, 16, 0.4);
        }

        .forgot-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .forgot-footer a {
            color: #E33E10;
            text-decoration: none;
            transition: 0.3s;
        }

        .forgot-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .forgot-container {
                flex-direction: column;
            }

            .forgot-image {
                width: 100%;
                padding: 30px;
            }

            .forgot-image-content i {
                font-size: 60px;
            }

            .forgot-image-content h2 {
                font-size: 24px;
            }

            .forgot-form-container {
                width: 100%;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-image">
            <div class="forgot-image-content">
                <i class="fas fa-key"></i>
                <h2>استعادة كلمة المرور</h2>
                <p>سنرسل لك رابطاً لإعادة تعيين كلمة المرور</p>
            </div>
        </div>

        <div class="forgot-form-container">
            <h2>استعادة كلمة المرور</h2>
            <p>أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور</p>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <div class="input-group">
                        <input type="email" id="email" name="email" required placeholder="example@snkwtyat.com">
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">إرسال رابط الاستعادة</button>
            </form>

            <div class="forgot-footer">
                <p>تذكرت كلمة المرور؟ <a href="admin-login.html">تسجيل الدخول</a></p>
                <p style="margin-top: 10px;">العودة إلى <a href="index.html">الصفحة الرئيسية</a></p>
            </div>
        </div>
    </div>

    <script>
        // Handle forgot password form submission
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');

        forgotPasswordForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;

            // Simple validation
            if (email) {
                // Show success message
                alert('تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني');

                // Redirect to login page
                window.location.href = 'admin-login.html';
            }
        });
    </script>
</body>
</html>
