<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - لوحة تحكم الإدارة</title>
    <meta name="description" content="إعدادات لوحة تحكم الإدارة لمنصة شنكوتيات">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="admin-notifications.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .sidebar-header h2 {
            color: #E33E10;
            font-size: 24px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 10px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: #666;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: #fff5f2;
            color: #E33E10;
        }

        .sidebar-menu i {
            width: 20px;
            text-align: center;
        }

        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 30px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .content-header h1 {
            font-size: 28px;
            color: #333;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E33E10 0%, #ff6b4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .settings-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 30px;
        }

        .settings-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .settings-tab {
            padding: 12px 25px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            border-radius: 8px;
            transition: 0.3s;
            font-family: 'Tajawal', sans-serif;
        }

        .settings-tab:hover {
            background: #f5f7fa;
            color: #E33E10;
        }

        .settings-tab.active {
            background: #E33E10;
            color: white;
        }

        .settings-section {
            display: none;
        }

        .settings-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #E33E10;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            font-weight: 600;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #E33E10 0%, #ff6b4a 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(227, 62, 16, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(227, 62, 16, 0.4);
        }

        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(100%);
                transition: transform 0.3s ease;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .main-content {
                margin-right: 0;
            }

            .settings-tabs {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 20px 15px;
            }

            .content-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>لوحة الإدارة</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> نظرة عامة</a></li>
                <li><a href="admin-orders.html"><i class="fas fa-shopping-bag"></i> إدارة الطلبات</a></li>
                <li><a href="admin-products.html"><i class="fas fa-box"></i> إدارة المنتجات</a></li>
                <li><a href="admin-users.html"><i class="fas fa-users"></i> إدارة المستخدمين</a></li>
                <li><a href="admin-reports.html"><i class="fas fa-chart-bar"></i> التقارير</a></li>
                <li><a href="admin-settings.html" class="active"><i class="fas fa-cog"></i> الإعدادات</a></li>
                <li><a href="index.html"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h1>الإعدادات</h1>
                <div class="user-info">
                    <span>المسؤول</span>
                    <div class="user-avatar">
                        <i class="fas fa-user-shield"></i>
                    </div>
                </div>
            </div>

            <div class="settings-container">
                <div class="settings-tabs">
                    <button class="settings-tab active" data-tab="general">
                        <i class="fas fa-cog"></i> الإعدادات العامة
                    </button>
                    <button class="settings-tab" data-tab="security">
                        <i class="fas fa-shield-alt"></i> الأمان
                    </button>
                    <button class="settings-tab" data-tab="payment">
                        <i class="fas fa-credit-card"></i> الدفع
                    </button>
                </div>

                <div id="general" class="settings-section active">
                    <form id="generalSettingsForm">
                        <div class="form-group">
                            <label for="siteName">اسم الموقع</label>
                            <input type="text" id="siteName" name="siteName" placeholder="شنكوتيات">
                        </div>

                        <div class="form-group">
                            <label for="siteDescription">وصف الموقع</label>
                            <textarea id="siteDescription" name="siteDescription" placeholder="منصة شنكوتيات للقوالب الاحترافية"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="contactEmail">البريد الإلكتروني للتواصل</label>
                            <input type="email" id="contactEmail" name="contactEmail" placeholder="info@snkwtyat.com">
                        </div>

                        <div class="form-group">
                            <label for="contactPhone">رقم الهاتف</label>
                            <input type="tel" id="contactPhone" name="contactPhone" placeholder="+966 50 123 4567">
                        </div>

                        <div class="form-group">
                            <label for="currency">العملة</label>
                            <select id="currency" name="currency">
                                <option value="SAR">ريال سعودي (SAR)</option>
                                <option value="USD">دولار أمريكي (USD)</option>
                                <option value="EUR">يورو (EUR)</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary">حفظ الإعدادات</button>
                    </form>
                </div>

                <div id="security" class="settings-section">
                    <form id="securitySettingsForm">
                        <div class="form-group">
                            <label for="currentPassword">كلمة المرور الحالية</label>
                            <input type="password" id="currentPassword" name="currentPassword" required>
                        </div>

                        <div class="form-group">
                            <label for="newPassword">كلمة المرور الجديدة</label>
                            <input type="password" id="newPassword" name="newPassword" required>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">تأكيد كلمة المرور الجديدة</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                        </div>

                        <button type="submit" class="btn btn-primary">تغيير كلمة المرور</button>
                    </form>
                </div>

                <div id="payment" class="settings-section">
                    <form id="paymentSettingsForm">
                        <div class="form-group">
                            <label for="paymentMethod">طريقة الدفع</label>
                            <select id="paymentMethod" name="paymentMethod">
                                <option value="stripe">Stripe</option>
                                <option value="paypal">PayPal</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="stripePublicKey">مفتاح Stripe العام</label>
                            <input type="text" id="stripePublicKey" name="stripePublicKey" placeholder="pk_live_...">
                        </div>

                        <div class="form-group">
                            <label for="stripeSecretKey">مفتاح Stripe السري</label>
                            <input type="password" id="stripeSecretKey" name="stripeSecretKey" placeholder="sk_live_...">
                        </div>

                        <button type="submit" class="btn btn-primary">حفظ إعدادات الدفع</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="admin-settings.js"></script>
</body>
</html>
