<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - الصفحة غير موجودة | شنكوتيات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Tajawal', sans-serif;
  background: #0f0f0f;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* خلفية متحركة */
.bg-circles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.circle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.08;
  animation: float 8s ease-in-out infinite;
}
.circle-1 { width: 500px; height: 500px; background: #E33E10; top: -150px; right: -150px; animation-delay: 0s; }
.circle-2 { width: 350px; height: 350px; background: #ff6b4a; bottom: -100px; left: -100px; animation-delay: 3s; }
.circle-3 { width: 200px; height: 200px; background: #E33E10; top: 50%; left: 50%; animation-delay: 1.5s; }
@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-30px) scale(1.05); }
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 20px;
  max-width: 600px;
}

/* شعار */
.logo {
  font-size: 24px;
  font-weight: 800;
  color: #E33E10;
  margin-bottom: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

/* رقم 404 */
.error-number {
  font-size: 160px;
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(135deg, #E33E10, #ff6b4a, #ffaa88);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  animation: pulse404 2s ease-in-out infinite;
  position: relative;
}
@keyframes pulse404 {
  0%, 100% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.03); filter: brightness(1.2); }
}

.error-icon {
  font-size: 50px;
  margin-bottom: 20px;
  animation: shake 3s ease-in-out infinite;
}
@keyframes shake {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-10deg); }
  75% { transform: rotate(10deg); }
}

.error-title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 15px;
  color: #fff;
}

.error-desc {
  font-size: 16px;
  color: #888;
  line-height: 1.8;
  margin-bottom: 40px;
}

.error-desc span {
  color: #E33E10;
  font-weight: 600;
}

/* أزرار */
.btns {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 50px;
}

.btn {
  padding: 14px 28px;
  border-radius: 12px;
  font-family: 'Tajawal', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, #E33E10, #ff6b4a);
  color: #fff;
  border: none;
  box-shadow: 0 8px 25px rgba(227,62,16,0.4);
}
.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 35px rgba(227,62,16,0.6);
}

.btn-secondary {
  background: transparent;
  color: #fff;
  border: 2px solid rgba(255,255,255,0.2);
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-3px);
}

/* روابط سريعة */
.quick-links {
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 30px;
}

.quick-links p {
  font-size: 14px;
  color: #555;
  margin-bottom: 15px;
}

.links-grid {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.quick-link {
  padding: 8px 16px;
  border: 1px solid rgba(227,62,16,0.3);
  border-radius: 20px;
  color: #E33E10;
  text-decoration: none;
  font-size: 13px;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.quick-link:hover {
  background: rgba(227,62,16,0.1);
  border-color: #E33E10;
  transform: translateY(-2px);
}

/* عداد تنازلي */
.countdown {
  margin-top: 30px;
  font-size: 13px;
  color: #444;
}
.countdown span { color: #E33E10; font-weight: 700; }

@media (max-width: 480px) {
  .error-number { font-size: 100px; }
  .error-title { font-size: 22px; }
  .btns { flex-direction: column; align-items: center; }
  .btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="bg-circles">
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>
</div>

<div class="container">
  <div class="logo">
    <i class="fas fa-palette"></i> شنكوتيات
  </div>

  <div class="error-icon">🔍</div>
  <div class="error-number">404</div>

  <h1 class="error-title">عذراً! الصفحة غير موجودة</h1>
  <p class="error-desc">
    الصفحة التي تبحث عنها <span>غير موجودة</span> أو تم نقلها.<br>
    لا تقلق، يمكنك العودة للرئيسية أو تصفح صفحاتنا.
  </p>

  <div class="btns">
    <a href="index.html" class="btn btn-primary">
      <i class="fas fa-home"></i> العودة للرئيسية
    </a>
    <a href="ai-builder.html" class="btn btn-secondary">
      <i class="fas fa-magic"></i> منشئ المواقع
    </a>
  </div>

  <div class="quick-links">
    <p>أو تفضل بزيارة إحدى صفحاتنا</p>
    <div class="links-grid">
      <a href="index.html#templates" class="quick-link"><i class="fas fa-th"></i> القوالب</a>
      <a href="index.html#features" class="quick-link"><i class="fas fa-star"></i> المميزات</a>
      <a href="index.html#pricing" class="quick-link"><i class="fas fa-tag"></i> الأسعار</a>
      <a href="index.html#contact" class="quick-link"><i class="fas fa-envelope"></i> تواصل معنا</a>
    </div>
  </div>

  <div class="countdown">
    سيتم تحويلك للرئيسية خلال <span id="timer">10</span> ثوان
  </div>
</div>

<script>
var t = 10;
var interval = setInterval(function() {
  t--;
  document.getElementById('timer').textContent = t;
  if (t <= 0) {
    clearInterval(interval);
    window.location.href = 'index.html';
  }
}, 1000);
</script>
</body>
</html>
